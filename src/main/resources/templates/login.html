<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1>Login</h1>
                <form th:action="@{/login}" method="post">
                    <div class="form-group row">
                        <label class="col-sm-3 col-form-label" for="usernameInput">Username</label>
                        <div class="col-sm-9">
                            <input id="usernameInput" name="username" placeholder="Enter your username" required class="form-control">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-3 col-form-label" for="passwordInput">Password</label>
                        <div class="col-sm-9">
                            <input id="passwordInput" name="password" type="password" placeholder="Enter your password" required class="form-control">
                        </div>
                    </div>
                    <button type="submit" id="loginButton" class="btn btn-primary">Login</button>
                </form>
                <p>Don't have an account?
                    <a th:href="@{/register}">Register here</a>
                </p>
                <p th:if="${param.error}">Invalid username or password</p>
                <p th:if="${param.logout}">You have been logged out</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
