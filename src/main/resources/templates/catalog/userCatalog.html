<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Catalog</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-2">
    <h2>Catalog by <span th:text="${username}">User</span></h2>
    <a th:href="@{/catalog}" class="btn btn-secondary btn-sm mb-3">View All Catalogs</a>
    <a th:href="@{/homepage}" class="btn btn-secondary btn-sm mb-3">Back to Home</a>

    <table border="1" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">Product Name</th>
            <th scope="col">Description</th>
            <th scope="col">Price</th>
            <th scope="col">Stock</th>
            <th scope="col">Origin Location</th>
            <th scope="col">Travel Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${catalogs.isEmpty()}">
            <td colspan="6" class="text-center text-muted">
                <em>This user has no products yet</em>
            </td>
        </tr>
        <tr th:each="catalog : ${catalogs}">
            <td th:text="${catalog.name}"></td>
            <td th:text="${catalog.description}"></td>
            <td th:text="${'Rp ' + #numbers.formatDecimal(catalog.price, 0, 'COMMA', 2, 'POINT')}"></td>
            <td th:text="${catalog.stock}"></td>
            <td th:text="${catalog.originLocation}"></td>
            <td th:text="${catalog.travelDate != null ? #temporals.format(catalog.travelDate, 'dd MMM yyyy') : '-'}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
