<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .table-dark { background-color: #212529; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2 class="display-6 fw-bold">📦 Order List</h2>
            <p class="text-muted">Manage and track your project orders here.</p>
        </div>
        <div class="col-md-4 text-end">
            <a href="/catalog" class="btn btn-outline-secondary">Return to Catalog</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">Order ID</th>
                    <th>Buyer ID</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th class="pe-4 text-end">Created At</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td class="ps-4 fw-bold" th:text="${order.id}">ORD-001</td>
                    <td th:text="${order.buyerId}">User123</td>
                    <td th:text="${'Rp ' + #numbers.formatDecimal(order.totalPrice, 0, 'POINT', 0, 'COMMA')}">Rp 50.000</td>
                    <td>
                                <span class="badge"
                                      th:classappend="${order.status.name() == 'COMPLETED' ? 'bg-success' :
                                                      (order.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-warning text-dark')}"
                                      th:text="${order.status}">PENDING</span>
                    </td>
                    <td class="pe-4 text-end text-muted" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">01 Mar 2024</td>
                </tr>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="5" class="text-center py-5">
                        <img src="https://cdn-icons-png.flaticon.com/512/4076/4076432.png" alt="empty" style="width: 80px;" class="mb-3 opacity-50">
                        <p class="text-muted">No orders found.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
