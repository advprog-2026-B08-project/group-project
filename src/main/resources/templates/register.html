<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO" crossorigin="anonymous">
</head>
<body>
    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="usernameInput">Username</label>
            <input id="usernameInput" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="passwordInput">Password</label>
            <input id="passwordInput" name="password" type="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group">
            <label for="confirmPasswordInput">Password</label>
            <input id="confirmPasswordInput" name="confirmPassword" type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" id="registerButton" class="btn btn-primary">Register</button>
    </form>
    <p th:if="${param.userExists}" class="text-danger">Username already exists</p>
    <p th:if="${param.error}" class="text-danger">Passwords do not match</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
