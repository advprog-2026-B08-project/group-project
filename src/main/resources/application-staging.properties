spring.application.name=group-project-staging

spring.datasource.url=${DATABASE_URL_STAGING}
spring.datasource.username=${DATABASE_USERNAME_STAGING}
spring.datasource.password=${DB_PASSWORD_STAGING}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

logging.level.root=INFO
logging.level.id.ac.ui.cs.advprog.groupproject=DEBUG
logging.level.org.springframework.security=DEBUG